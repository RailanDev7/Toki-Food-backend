version: '3.8'

services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/container.env
    depends_on:
      - authdb
      - redis
      - rabbitmq
    volumes:
      - ./auth-service:/app
      - /app/node_modules

    networks:
      - app-network
    

  authdb:
    image: mysql:8.0
    container_name: authdb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_service
      MYSQL_USER: authuser
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - auth-mysql-data:/var/lib/mysql
    networks:
      - app-network
  redis:
    image: redis:7-alpine
    container_name: redis-auth
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
  redisinsight: 
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - app-network
  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
volumes:
  auth-mysql-data:
  redis_data:
  rabbitmq_data:

networks:
  app-network: